syntax = "proto3";

package memos.store;

option go_package = "gen/store";

message InboxMessage {
  message MemoCommentPayload {
    int32 memo_id = 1;
    int32 related_memo_id = 2;
  }

  // The type of the inbox message.
  Type type = 1;
  oneof payload {
    MemoCommentPayload memo_comment = 2;
  }

  enum Type {
    TYPE_UNSPECIFIED = 0;
    // Memo comment notification.
    MEMO_COMMENT = 1;
  }
}
